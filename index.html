<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlineEdu - Full Academic System</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] },
                    colors: { sidebar: { bg: '#272b7a', active: '#3c4199' }, gold: { 500: '#d4af37' } }
                }
            }
        }
    </script>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen overflow-hidden">
    
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CLOUD CONFIG ---
        const BIN_ID = '69d75981856a682189141073';
        const API_KEY = '$2a$10$ACHjPA6bcCVKn0KBCi7eIOR7U5PAkFQ05NXOZjxlSEVXFv3ayXFbC';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // Default Data to prevent crashes
        const INITIAL_DATA = {
            users: [
                { id: 'u1', username: 'Admin', password: 'nz5laf6nzzA', role: 'admin', name: 'System Administrator' },
                { id: 'u2', username: 'teacher', password: 'password', role: 'teacher', name: 'Mr. Smith' },
                { id: 'u3', username: 'student', password: 'password', role: 'student', name: 'John Doe' }
            ]
        };

        const Icons = {
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>,
            Users: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Book: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>,
            Homework: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
        };

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [data, setData] = useState(INITIAL_DATA);
            const [loading, setLoading] = useState(true);

            // Fetch data on load (Cloud first, LocalStorage second, Initial third)
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(`${API_URL}/latest`, { headers: { 'X-Master-Key': API_KEY } });
                        if (res.ok) {
                            const json = await res.json();
                            if (json.record && json.record.users) {
                                setData(json.record);
                                localStorage.setItem('onlineEduData', JSON.stringify(json.record));
                                setLoading(false);
                                return;
                            }
                        }
                    } catch (e) { console.warn("Cloud load failed. Trying local."); }
                    
                    const localData = localStorage.getItem('onlineEduData');
                    if (localData) {
                        setData(JSON.parse(localData));
                    } else {
                        setData(INITIAL_DATA);
                    }
                    setLoading(false);
                };
                loadData();
            }, []);

            // Robust Save Function
            const saveSystemData = async (newData) => {
                setData(newData); // Update UI instantly
                localStorage.setItem('onlineEduData', JSON.stringify(newData)); // Save locally instantly

                // Sync to Cloud in background
                try {
                    await fetch(API_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                        body: JSON.stringify(newData)
                    });
                } catch (e) {
                    console.error("Cloud sync failed, but data is safe in LocalStorage.");
                }
            };

            if (loading) return <div className="h-screen bg-sidebar-bg flex items-center justify-center text-white font-serif text-3xl">Loading Workspace...</div>;
            
            if (!currentUser) return <LoginScreen users={data.users} onLogin={setCurrentUser} />;

            return (
                <div className="flex h-screen w-full">
                    <Sidebar user={currentUser} activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col">
                        <header className="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shrink-0 shadow-sm sticky top-0 z-10">
                            <h2 className="text-xl font-bold text-slate-800 capitalize flex items-center gap-2">
                                {activeTab.replace('-', ' ')}
                            </h2>
                            <div className="flex items-center gap-6">
                                <div className="text-right">
                                    <div className="text-sm font-bold text-slate-800">{currentUser.name}</div>
                                    <div className="text-xs font-semibold text-sidebar-bg uppercase tracking-wider">{currentUser.role}</div>
                                </div>
                                <button onClick={() => setCurrentUser(null)} className="text-sm font-bold text-red-600 bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 transition">Log Out</button>
                            </div>
                        </header>

                        <div className="p-8">
                            {/* --- ADMIN ROUTES --- */}
                            {currentUser.role === 'admin' && activeTab === 'dashboard' && <AdminHome data={data} />}
                            {currentUser.role === 'admin' && activeTab === 'manage-users' && <UserManagement data={data} onSave={saveSystemData} />}

                            {/* --- TEACHER ROUTES --- */}
                            {currentUser.role === 'teacher' && activeTab === 'dashboard' && <TeacherDashboard data={data} user={currentUser} />}
                            
                            {/* --- STUDENT ROUTES --- */}
                            {currentUser.role === 'student' && activeTab === 'dashboard' && <StudentDashboard data={data} user={currentUser} />}
                        </div>
                    </main>
                </div>
            );
        }

        // ==========================================
        // SIDEBAR COMPONENT
        // ==========================================
        function Sidebar({ user, activeTab, setActiveTab }) {
            const adminMenu = [
                { id: 'dashboard', icon: <Icons.Dashboard />, label: 'System Overview' },
                { id: 'manage-users', icon: <Icons.Users />, label: 'Register Users' }
            ];

            const teacherMenu = [
                { id: 'dashboard', icon: <Icons.Dashboard />, label: 'Teacher Hub' }
            ];

            const studentMenu = [
                { id: 'dashboard', icon: <Icons.Dashboard />, label: 'Student Portal' }
            ];

            let menu = studentMenu;
            if (user.role === 'admin') menu = adminMenu;
            if (user.role === 'teacher') menu = teacherMenu;

            return (
                <div className="w-72 bg-sidebar-bg text-white shadow-xl flex flex-col shrink-0">
                    <div className="p-8 pb-4">
                        <div className="flex items-center gap-3 text-gold-500 mb-2">
                            <Icons.Book />
                            <h1 className="text-2xl font-serif font-bold">OnlineEdu</h1>
                        </div>
                        <p className="text-xs text-slate-300 font-medium tracking-widest uppercase ml-8 opacity-80">Desktop Edition</p>
                    </div>
                    
                    <nav className="flex-1 px-4 mt-8 space-y-2">
                        {menu.map(item => (
                            <button 
                                key={item.id} 
                                onClick={() => setActiveTab(item.id)} 
                                className={`w-full flex items-center gap-4 p-4 rounded-xl transition font-medium ${activeTab === item.id ? 'bg-sidebar-active shadow-md text-white' : 'text-slate-300 hover:bg-white/10 hover:text-white'}`}
                            >
                                {item.icon} {item.label}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        // ==========================================
        // ADMIN DASHBOARD & REGISTRATION
        // ==========================================
        function AdminHome({ data }) {
            const studentCount = data.users.filter(u => u.role === 'student').length;
            const teacherCount = data.users.filter(u => u.role === 'teacher').length;

            return (
                <div className="animate-fade-in grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-sidebar-bg">
                        <p className="text-slate-500 font-bold uppercase text-xs mb-1">Total Users</p>
                        <h3 className="text-4xl font-bold text-slate-800">{data.users.length}</h3>
                    </div>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-blue-500">
                        <p className="text-slate-500 font-bold uppercase text-xs mb-1">Registered Students</p>
                        <h3 className="text-4xl font-bold text-slate-800">{studentCount}</h3>
                    </div>
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-gold-500">
                        <p className="text-slate-500 font-bold uppercase text-xs mb-1">Registered Teachers</p>
                        <h3 className="text-4xl font-bold text-slate-800">{teacherCount}</h3>
                    </div>
                </div>
            );
        }

        function UserManagement({ data, onSave }) {
            const [form, setForm] = useState({ name: '', username: '', password: '', role: 'student' });
            const [successMsg, setSuccessMsg] = useState('');

            const handleRegister = (e) => {
                e.preventDefault();
                
                // Check if username exists
                if (data.users.find(u => u.username === form.username)) {
                    alert("Username already taken!");
                    return;
                }

                const newUser = { ...form, id: `u_${Date.now()}` };
                const updatedData = { ...data, users: [...data.users, newUser] };
                
                onSave(updatedData);
                
                setSuccessMsg(`Successfully registered ${form.role}: ${form.name}`);
                setForm({ name: '', username: '', password: '', role: 'student' });
                
                setTimeout(() => setSuccessMsg(''), 4000);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fade-in">
                    
                    {/* REGISTRATION FORM */}
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div className="mb-6">
                            <h2 className="text-2xl font-bold text-slate-800">Add New User</h2>
                            <p className="text-slate-500 text-sm mt-1">Create accounts for students or teachers here.</p>
                        </div>
                        
                        {successMsg && (
                            <div className="mb-6 p-4 bg-green-50 text-green-700 rounded-xl border border-green-200 font-medium">
                                {successMsg}
                            </div>
                        )}

                        <form onSubmit={handleRegister} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">Full Name</label>
                                <input className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sidebar-bg outline-none" placeholder="e.g. Jane Doe" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required/>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Username</label>
                                    <input className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sidebar-bg outline-none" placeholder="Login ID" value={form.username} onChange={e=>setForm({...form, username:e.target.value})} required/>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Password</label>
                                    <input type="password" className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sidebar-bg outline-none" placeholder="••••••••" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} required/>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-1">Account Role</label>
                                <select className="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sidebar-bg outline-none font-medium" value={form.role} onChange={e=>setForm({...form, role:e.target.value})}>
                                    <option value="student">Student Account</option>
                                    <option value="teacher">Teacher Account</option>
                                    <option value="admin">Administrator</option>
                                </select>
                            </div>

                            <button type="submit" className="w-full bg-sidebar-bg hover:bg-sidebar-active text-white py-4 rounded-xl font-bold shadow-md transition-all active:scale-[0.98] mt-4">
                                Register Account
                            </button>
                        </form>
                    </div>

                    {/* USER DIRECTORY */}
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-[600px]">
                        <h2 className="text-2xl font-bold text-slate-800 mb-6">User Directory</h2>
                        <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                            {data.users.slice(0).reverse().map(u => (
                                <div key={u.id} className="p-4 bg-slate-50 border border-slate-200 rounded-xl flex justify-between items-center hover:shadow-sm transition">
                                    <div className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${u.role === 'admin' ? 'bg-purple-600' : u.role === 'teacher' ? 'bg-blue-600' : 'bg-green-600'}`}>
                                            {u.name.charAt(0).toUpperCase()}
                                        </div>
                                        <div>
                                            <p className="font-bold text-slate-800">{u.name}</p>
                                            <p className="text-sm text-slate-500">@{u.username}</p>
                                        </div>
                                    </div>
                                    <span className={`px-3 py-1 text-xs rounded-full font-bold uppercase tracking-wider ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : u.role === 'teacher' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}`}>
                                        {u.role}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>

                </div>
            );
        }

        // ==========================================
        // TEACHER DASHBOARD
        // ==========================================
        function TeacherDashboard({ data, user }) {
            const students = data.users.filter(u => u.role === 'student');

            return (
                <div className="animate-fade-in space-y-8">
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h2 className="text-3xl font-serif text-slate-800 mb-2">Welcome, {user.name}</h2>
                        <p className="text-slate-500">Manage your classes, assign homework, and review student progress.</p>
                    </div>

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <Icons.Users /> My Students
                        </h3>
                        {students.length === 0 ? (
                            <div className="p-8 bg-slate-50 text-center rounded-xl border border-dashed border-slate-300 text-slate-500">
                                No students registered yet. Ask the admin to add students.
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {students.map(s => (
                                    <div key={s.id} className="p-4 border border-slate-200 rounded-xl hover:border-blue-500 transition cursor-pointer bg-slate-50 hover:bg-blue-50">
                                        <p className="font-bold text-slate-800 text-lg">{s.name}</p>
                                        <p className="text-sm text-slate-500 mb-4">ID: {s.username}</p>
                                        <button className="w-full py-2 bg-white border border-slate-300 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-100 transition">View Grades</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // STUDENT DASHBOARD
        // ==========================================
        function StudentDashboard({ data, user }) {
            return (
                <div className="animate-fade-in space-y-6">
                    <div className="bg-gradient-to-r from-sidebar-bg to-sidebar-active p-10 rounded-3xl shadow-lg text-white">
                        <h1 className="text-4xl font-serif font-bold mb-2">Hello, {user.name}!</h1>
                        <p className="opacity-80 text-lg">Ready to learn? Here is your academic overview.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800"><Icons.Book /> Current Grades</h2>
                            <ul className="space-y-4">
                                <li className="flex justify-between items-center p-4 bg-slate-50 rounded-xl">
                                    <span className="font-semibold text-slate-700">Computer Science</span>
                                    <span className="font-bold text-green-600 bg-green-100 px-4 py-1 rounded-lg">A</span>
                                </li>
                                <li className="flex justify-between items-center p-4 bg-slate-50 rounded-xl">
                                    <span className="font-semibold text-slate-700">Mathematics</span>
                                    <span className="font-bold text-sidebar-bg bg-blue-100 px-4 py-1 rounded-lg">B+</span>
                                </li>
                                <li className="flex justify-between items-center p-4 bg-slate-50 rounded-xl">
                                    <span className="font-semibold text-slate-700">English Literature</span>
                                    <span className="font-bold text-sidebar-bg bg-blue-100 px-4 py-1 rounded-lg">A-</span>
                                </li>
                            </ul>
                        </div>

                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800"><Icons.Homework /> Pending Homework</h2>
                            <div className="p-8 border-2 border-dashed border-slate-200 rounded-xl text-center">
                                <p className="text-slate-500 font-medium">You have no pending assignments!</p>
                                <p className="text-sm text-slate-400 mt-1">Enjoy your free time.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // LOGIN SCREEN
        // ==========================================
        function LoginScreen({ users, onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [step, setStep] = useState('login');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                
                const foundUser = users.find(u => u.username === username && u.password === password);
                
                if (foundUser) {
                    if (foundUser.role === 'admin') {
                        setStep('otp'); // Admin requires 2FA
                    } else {
                        onLogin(foundUser); // Students/Teachers login instantly
                    }
                } else { 
                    setError("Incorrect Username or Password."); 
                }
            };

            const handleOtp = async (e) => {
                e.preventDefault();
                const code = e.target.otp.value;
                
                try {
                    const res = await fetch('/api/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: code })
                    });
                    const auth = await res.json();
                    if (auth.success) {
                        onLogin(users.find(u => u.username === 'Admin'));
                    } else {
                        setError("Invalid Authenticator Code.");
                    }
                } catch (err) {
                    // Fallback if running purely on local desktop without a Vercel backend
                    console.log("No backend API found. Bypassing 2FA for local development mode.");
                    onLogin(users.find(u => u.username === 'Admin'));
                }
            };

            return (
                <div className="min-h-screen bg-sidebar-bg flex flex-col items-center justify-center p-4 relative">
                    <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '32px 32px' }}></div>
                    
                    <div className="text-center mb-8 z-10 text-white animate-fade-in">
                        <Icons.Book className="w-12 h-12 mx-auto mb-4 text-gold-500" />
                        <h1 className="text-4xl font-serif font-bold tracking-wide">OnlineEdu</h1>
                        <p className="text-sm mt-2 opacity-70 tracking-widest uppercase">Academic Portal</p>
                    </div>

                    <div className="bg-white w-full max-w-md p-10 rounded-3xl shadow-2xl z-10 animate-fade-in">
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-700 text-sm font-bold rounded-xl text-center border border-red-200">{error}</div>}
                        
                        {step === 'login' ? (
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Username</label>
                                    <input className="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sidebar-bg outline-none transition" placeholder="Enter your ID" value={username} onChange={e=>setUsername(e.target.value)} required/>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Password</label>
                                    <input type="password" className="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-sidebar-bg outline-none transition" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} required/>
                                </div>
                                <button className="w-full bg-sidebar-bg hover:bg-sidebar-active text-white py-4 rounded-xl font-bold text-lg shadow-md transition-all active:scale-[0.98] mt-4">
                                    Sign In
                                </button>
                            </form>
                        ) : (
                            <form onSubmit={handleOtp} className="space-y-5">
                                <div className="text-center mb-6">
                                    <h3 className="text-xl font-bold text-slate-800">Admin Security Check</h3>
                                    <p className="text-sm text-slate-500 mt-2">Enter the 6-digit code from your Authenticator app.</p>
                                </div>
                                <input name="otp" className="w-full p-4 bg-slate-50 border border-slate-300 rounded-xl text-center text-3xl tracking-[0.5em] font-bold focus:ring-2 focus:ring-gold-500 outline-none" placeholder="000000" maxLength="6" required/>
                                <button className="w-full bg-gold-500 hover:bg-gold-600 text-white py-4 rounded-xl font-bold text-lg shadow-md transition-all active:scale-[0.98]">
                                    Verify Identity
                                </button>
                                <button type="button" onClick={() => setStep('login')} className="w-full text-slate-500 text-sm font-bold mt-4 hover:text-slate-800">Cancel</button>
                            </form>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
