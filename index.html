<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlineEdu - Academic System</title>
    
    <!-- Academic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    },
                    colors: {
                        sidebar: {
                            bg: '#272b7a',    
                            active: '#3c4199', 
                            hover: '#31368c'
                        },
                        gold: {
                            500: '#d4af37', 
                            600: '#b5952f',
                        }
                    }
                }
            }
        }
    </script>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased h-screen overflow-hidden">
    
    <div id="loading-screen" class="fixed inset-0 bg-sidebar-bg flex flex-col items-center justify-center z-50 text-white transition-opacity duration-500">
        <h1 class="font-serif text-3xl font-bold tracking-widest text-gold-500">OnlineEdu</h1>
        <p class="text-white/60 mt-2">Connecting to Cloud Database...</p>
    </div>

    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- JSONBIN CONFIGURATION ---
        const BIN_ID = '69d75981856a682189141073';
        const API_KEY = '$2a$10$ACHjPA6bcCVKn0KBCi7eIOR7U5PAkFQ05NXOZjxlSEVXFv3ayXFbC';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        const CLASSES = Array.from({length: 12}, (_, i) => ['A', 'B', 'C', 'D'].map(l => `${i+1}${l}`)).flat();
        const SUBJECTS = ['English', 'Math', 'Georgian', 'Science', 'History', 'Sport', 'Art', 'Music'];
        const INITIAL_ADMIN = { id: 'admin-1', username: 'Admin', password: 'nz5laf6nzzA', role: 'admin', name: 'System Administrator' };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden ${className}`}>{children}</div>
        );

        const Button = ({ children, onClick, type = 'button', variant = 'primary', className = '', ...props }) => {
            const baseStyle = "px-4 py-2.5 rounded-lg font-semibold transition-all flex items-center justify-center gap-2 active:scale-95";
            const variants = {
                primary: "bg-sidebar-bg hover:bg-sidebar-active text-white shadow-md",
                gold: "bg-gold-500 hover:bg-gold-600 text-white shadow-md",
                secondary: "bg-white border border-slate-200 hover:border-sidebar-bg text-slate-700 hover:text-sidebar-bg",
                dangerSolid: "bg-red-600 hover:bg-red-700 text-white",
            };
            return (
                <button type={type} onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>
                    {children}
                </button>
            );
        };

        const Icons = {
            Dashboard: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>,
            Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
            Homework: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
            Classes: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Left: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            CloudSync: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin text-sidebar-bg"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
        };

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [data, setData] = useState({ users: [], records: [], exams: [], homeworks: [] });
            const [isInitialized, setIsInitialized] = useState(false);

            useEffect(() => {
                fetch(`${API_URL}/latest`, { headers: { 'X-Master-Key': API_KEY } })
                .then(res => res.json())
                .then(json => {
                    if (json.record) {
                        setData({
                            users: (json.record.users && json.record.users.length > 0) ? json.record.users : [INITIAL_ADMIN],
                            records: json.record.records || [], exams: json.record.exams || [], homeworks: json.record.homeworks || []
                        });
                    }
                    setIsInitialized(true);
                    const loader = document.getElementById('loading-screen');
                    if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }
                })
                .catch(err => {
                    setData({ users: [INITIAL_ADMIN], records: [], exams: [], homeworks: [] });
                    setIsInitialized(true);
                    const loader = document.getElementById('loading-screen');
                    if (loader) loader.style.display = 'none';
                });
            }, []);

            if (!currentUser) return <LoginScreen users={data.users} onLogin={setCurrentUser} />;

            return (
                <div className="flex h-screen w-full bg-slate-50 overflow-hidden">
                    <Sidebar user={currentUser} activeTab={activeTab} setActiveTab={setActiveTab} />
                    <div className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shrink-0 z-10 shadow-sm">
                            <h2 className="text-xl font-serif font-bold text-sidebar-bg hidden sm:block">OnlineEdu</h2>
                            <div className="flex items-center gap-6">
                                <div className="text-right">
                                    <div className="text-sm font-bold text-slate-800">{currentUser.name}</div>
                                    <div className="text-xs font-semibold text-sidebar-bg uppercase tracking-wider">{currentUser.role}</div>
                                </div>
                                <button onClick={() => setCurrentUser(null)} className="p-2 text-slate-400 hover:text-red-600 transition-colors bg-slate-50 rounded-full hover:bg-red-50">
                                    <Icons.LogOut />
                                </button>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-4 sm:p-8 relative">
                           {/* Add your existing Dashboard/Tabs logic here if needed */}
                           <div className="animate-fade-in p-8 bg-white shadow-sm rounded-xl border-l-4 border-sidebar-bg">
                               <h1 className="text-3xl font-serif font-bold">Welcome, {currentUser.name}!</h1>
                               <p className="text-slate-500 mt-2">You are logged into the Academic System securely.</p>
                           </div>
                        </main>
                    </div>
                </div>
            );
        }

        function Sidebar({ user, activeTab, setActiveTab }) {
            return (
                <div className="w-24 sm:w-28 bg-sidebar-bg flex flex-col items-center py-6 shadow-2xl z-20 shrink-0 h-full">
                    <div className="mb-10 text-white flex justify-center items-center"><Icons.Book /></div>
                </div>
            );
        }

        // ==========================================
        // UPDATED LOGIN SCREEN (WITH TOTP & EASTER EGG)
        // ==========================================
        function LoginScreen({ users, onLogin }) {
            const [step, setStep] = useState('login'); // 'login' | 'otp' | 'qr'
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [otpCode, setOtpCode] = useState('');
            const [error, setError] = useState('');
            const [pendingUser, setPendingUser] = useState(null);
            const [qrImage, setQrImage] = useState(null);

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');

                // 1. Check for QR Generation Easter Egg
                if (username === '#otpreg' && password === 'qututuna') {
                    setStep('qr');
                    fetch('/api/generate-qr')
                        .then(res => res.json())
                        .then(data => {
                            if(data.qr) setQrImage(data.qr);
                            else setError("API Error generating QR.");
                        })
                        .catch(err => setError("Failed to reach Vercel API. Are you running on localhost without backend?"));
                    return;
                }

                // 2. Standard Login Check
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    if (user.username === 'Admin') {
                        // Admin requires Authenticator Check
                        setPendingUser(user);
                        setStep('otp');
                    } else {
                        // Regular users log in instantly
                        onLogin(user);
                    }
                } else {
                    setError('Incorrect credentials.');
                }
            };

            const handleOtpSubmit = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    const res = await fetch('/api/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: otpCode })
                    });
                    const data = await res.json();
                    if (data.success) {
                        onLogin(pendingUser);
                    } else {
                        setError('Invalid Authenticator Code.');
                    }
                } catch (err) {
                    setError('Server error validating code.');
                }
            };

            return (
                <div className="min-h-screen bg-sidebar-bg flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 2px 2px, white 1px, transparent 0)', backgroundSize: '32px 32px' }}></div>
                    
                    <div className="text-center mb-8 z-10 flex flex-col items-center animate-fade-in">
                        <div className="bg-white/10 p-5 rounded-3xl mb-6 shadow-lg backdrop-blur-sm text-gold-500">
                            <Icons.Shield />
                        </div>
                        <h1 className="text-4xl font-serif font-bold text-white mb-2 tracking-wide">OnlineEdu</h1>
                    </div>

                    <Card className="w-full max-w-md p-8 z-10 border-t-8 border-gold-500 shadow-2xl animate-fade-in">
                        
                        {/* STATE 1: STANDARD LOGIN */}
                        {step === 'login' && (
                            <>
                                <h2 className="text-xl font-bold text-slate-800 mb-6 text-center font-serif">Sign In</h2>
                                {error && <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm mb-6 text-center">{error}</div>}
                                <form onSubmit={handleLogin} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">Username</label>
                                        <input type="text" className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sidebar-bg outline-none" value={username} onChange={e => setUsername(e.target.value)} required />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-1">Password</label>
                                        <input type="password" className="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sidebar-bg outline-none" value={password} onChange={e => setPassword(e.target.value)} required />
                                    </div>
                                    <Button type="submit" variant="primary" className="w-full py-3.5 text-lg mt-4">Authorize</Button>
                                </form>
                            </>
                        )}

                        {/* STATE 2: 2FA OTP ENTRY */}
                        {step === 'otp' && (
                            <div className="animate-fade-in">
                                <button onClick={() => setStep('login')} className="text-slate-400 hover:text-sidebar-bg mb-4 flex items-center gap-1 text-sm"><Icons.Left/> Back</button>
                                <h2 className="text-xl font-bold text-slate-800 mb-2 text-center font-serif">Two-Factor Auth</h2>
                                <p className="text-slate-500 text-sm text-center mb-6">Enter the 6-digit code from your Authenticator App.</p>
                                
                                {error && <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm mb-6 text-center">{error}</div>}
                                
                                <form onSubmit={handleOtpSubmit} className="space-y-5">
                                    <div>
                                        <input type="text" maxLength="6" className="w-full p-4 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-sidebar-bg outline-none text-center text-3xl tracking-[1em] font-bold" value={otpCode} onChange={e => setOtpCode(e.target.value)} required placeholder="••••••" />
                                    </div>
                                    <Button type="submit" variant="gold" className="w-full py-3.5 text-lg">Verify & Login</Button>
                                </form>
                            </div>
                        )}

                        {/* STATE 3: EASTER EGG QR GENERATION */}
                        {step === 'qr' && (
                            <div className="animate-fade-in text-center flex flex-col items-center">
                                <button onClick={() => { setStep('login'); setUsername(''); setPassword(''); setQrImage(null); }} className="text-slate-400 hover:text-sidebar-bg mb-4 self-start flex items-center gap-1 text-sm"><Icons.Left/> Back</button>
                                
                                <h2 className="text-xl font-bold text-slate-800 mb-2 font-serif">QR Generation</h2>
                                <p className="text-slate-500 text-sm mb-6">Scan this with Google Authenticator or Authy to bind the Admin account.</p>
                                
                                {error ? (
                                    <div className="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg text-sm mb-6">{error}</div>
                                ) : !qrImage ? (
                                    <div className="flex flex-col items-center justify-center p-12"><Icons.CloudSync /><p className="mt-4 text-sm text-slate-500">Generating QR...</p></div>
                                ) : (
                                    <div className="bg-slate-50 p-4 border border-slate-200 rounded-xl mb-4">
                                        <img src={qrImage} alt="TOTP QR Code" className="w-48 h-48 mx-auto" />
                                    </div>
                                )}
                            </div>
                        )}

                    </Card>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
